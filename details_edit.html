{% extends 'base.html' %}
{% block content %}

<div class="d-flex justify-content-end my-3">
    <a href="{{ url_for('details_list') }}">
        <button class="btn btn-secondary">Back</button>
    </a>
</div>

<form method="POST">

    <div class="mb-3">
        <label>Name</label>
        <input type="text" name="name" class="form-control" required value="{{ details.name }}">
    </div>

    <div class="mb-3">
        <label>Role</label>
        <input type="text" name="role" class="form-control" required value="{{ details.role }}">
    </div>

    <input type="submit" value="Update" class="btn btn-success">

</form>

{% endblock %}
